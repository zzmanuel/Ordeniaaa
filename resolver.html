<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolver Guía - Ordenia</title>
    <style>
        :root {
            --azul-google: #1a73e8;
            --azul-oscuro: #1557b0;
            --blanco: #ffffff;
            --fondo: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fondo);
            margin: 0;
            color: #3c4043;
            /* FLEXBOX PARA CENTRADO TOTAL */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        header {
            background: var(--blanco);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
            color: var(--azul-google);
            margin-bottom: 20px;
        }

        .main-card {
            background: var(--blanco);
            max-width: 550px;
            width: 90%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            /* Asegura que la tarjeta esté centrada horizontalmente */
            margin: 20px auto; 
        }

        h1 { color: var(--azul-google); font-size: 26px; margin-bottom: 10px; }
        p { margin-bottom: 25px; color: #5f6368; }

        /* Area de Subida */
        .upload-box {
            border: 2px dashed #dadce0;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-box:hover {
            border-color: var(--azul-google);
            background: #f1f8ff;
        }

        #preview-img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            display: none;
            margin-top: 15px;
            border-radius: 10px;
        }

        /* Botón Estilo Moderno */
        .btn-ia {
            background: var(--azul-google);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-ia:hover { background: var(--azul-oscuro); transform: translateY(-2px); }
        .btn-ia:active { transform: translateY(0); }

        /* Resultado */
        #resultadoContenedor {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #e8f0fe;
            border-radius: 15px;
            text-align: left;
            border-left: 8px solid var(--azul-google);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--azul-google);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .back-link:hover { text-decoration: underline; }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-content { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>Ordenia PLUS</header>

    <div class="main-card">
        <h1>Resuelve tu Guía</h1>
        <p>Sube o toma una foto de tu ejercicio escolar.</p>

        <label for="foto" class="upload-box">
            <div id="texto-ayuda">
                <div style="font-size: 50px; margin-bottom: 10px;">📸</div>
                <strong>Haz clic para subir o capturar foto</strong>
            </div>
            <img id="preview-img" src="#">
            <input type="file" id="foto" accept="image/*" style="display:none">
        </label>

        <button id="btn-resolver" class="btn-ia" onclick="ejecutarIA()">
            <div class="btn-content">
                <div class="spinner" id="carga"></div>
                <span id="btn-texto">Analizar con Inteligencia Artificial</span>
            </div>
        </button>

        <div id="resultadoContenedor">
            <h3 style="color: var(--azul-oscuro); margin-top: 0; font-size: 18px;">Solución detectada:</h3>
            <div id="textoIA" style="white-space: pre-wrap; line-height: 1.6; font-size: 15px;"></div>
        </div>

        <a href="ordenia.html" class="back-link">← Regresar al menú principal</a>
    </div>

    <script>
    const input = document.getElementById('foto');
    const preview = document.getElementById('preview-img');
    const ayuda = document.getElementById('texto-ayuda');
    
    input.onchange = e => {
        const [file] = input.files;
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            ayuda.style.display = 'none';
        }
    }

    async function ejecutarIA() {
        const file = input.files[0];
        if (!file) return alert("Por favor, selecciona una imagen primero.");

        // PEGA TU TOKEN AQUÍ (el que empieza con hf_...)
        const TOKEN = "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"; 

        const btn = document.getElementById('btn-resolver');
        const carga = document.getElementById('carga');
        const txt = document.getElementById('btn-texto');
        
        btn.disabled = true;
        carga.style.display = 'block';
        txt.innerText = "Analizando imagen...";

        try {
            const imageData = await file.arrayBuffer();

            const response = await fetch(
                "https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-large",
                {
                    headers: { Authorization: `Bearer ${TOKEN}` },
                    method: "POST",
                    body: imageData,
                }
            );

            const result = await response.json();
            
            document.getElementById('resultadoContenedor').style.display = 'block';
            // Mostramos el resultado
            document.getElementById('textoIA').innerText = "Resultado del análisis: " + result[0].generated_text;

        } catch (err) {
            alert("Error con Hugging Face. Asegúrate de que el Token sea correcto.");
        } finally {
            btn.disabled = false;
            carga.style.display = 'none';
            txt.innerText = "Analizar con Inteligencia Artificial";
        }
    }
</script>
</body>
</html>
